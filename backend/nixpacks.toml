[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]

[phases.build]
cmds = ["npx prisma generate", "npm run build"]

[start]
cmd = "sh -c 'set -e; while true; do OUT=$(npm run -s db:push 2>&1) && break || true; echo \"$OUT\"; if echo \"$OUT\" | grep -q \"P1001\"; then echo \"[startup] waiting for database...\"; sleep 3; continue; fi; echo \"[startup] schema sync failed\"; exit 1; done; npm start'"
