[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]

[phases.build]
cmds = ["npx prisma generate", "npm run build"]

[start]
cmd = "sh -c 'set -e; while true; do OUT=$(npm run -s migrate:deploy 2>&1) && break || true; echo \"$OUT\"; if echo \"$OUT\" | grep -q \"P3005\"; then echo \"[startup] baselining existing database...\"; for M in $(ls -1 prisma/migrations 2>/dev/null | grep -E \"^[0-9]\" | sort); do npx prisma migrate resolve --applied \"$M\" || true; done; npm run -s migrate:deploy && break; fi; echo \"[startup] waiting for database...\"; sleep 3; done; npm start'"
